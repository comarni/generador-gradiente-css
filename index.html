<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Conversor de Texto Online: mayusculas, minusculas, titulo, slug SEO, quitar tildes y mas." />
  <title>Conversor de Texto Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Build note: minify styles.css + script.js for production deploy -->
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <div class="page">
    <header class="header">
      <div>
        <p class="kicker">Herramienta Gratuita</p>
        <h1>Conversor de Texto Online</h1>
        <p class="subtitle">Transforma texto en segundos: mayusculas, minusculas, formato titulo, slug SEO y mas.</p>
      </div>

      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema" title="Cambiar tema">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Modo oscuro</span>
      </button>
    </header>

    <main class="card">
      <label class="input-label" for="textInput">Tu texto</label>
      <textarea id="textInput" placeholder="Escribe o pega aqui tu texto..."></textarea>

      <div id="stats" class="stats" aria-live="polite">
        <span><strong id="charCount">0</strong> caracteres</span>
        <span><strong id="wordCount">0</strong> palabras</span>
      </div>

      <section class="actions" aria-label="Acciones de conversion">
        <button class="btn" data-action="uppercase" type="button">MAYUSCULAS</button>
        <button class="btn" data-action="lowercase" type="button">minusculas</button>
        <button class="btn" data-action="titlecase" type="button">Tipo Titulo</button>
        <button class="btn" data-action="remove-special" type="button">Quitar tildes y especiales</button>
        <button class="btn" data-action="slug" type="button">Generar slug SEO</button>
        <button class="btn btn-accent" data-action="copy" type="button">Copiar resultado</button>
        <button class="btn btn-danger" data-action="clear" type="button">Limpiar texto</button>
      </section>

      <p class="hint">Consejo: el conteo se actualiza automaticamente mientras escribes.</p>
    </main>

    <footer class="footer">Desarrollado por Komarn.IA - 2026</footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
